<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concurso Laboral - Selección de Aspirantes</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2, h3 { color: #2c3e50; text-align: center; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        button:hover { background-color: #2980b9; }
        .btn-secondary { background-color: #95a5a6; }
        .btn-secondary:hover { background-color: #7f8c8d; }
        .stats { margin-top: 25px; padding-top: 20px; border-top: 2px solid #f1f1f1; }
        .stat-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 16px; }
        .val { font-weight: bold; color: #27ae60; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <section id="concurso">
            <h2>Concurso Laboral</h2>
            <button id="concurso_btNuevo">Registrar Nuevo Aspirante</button>
            
            <div class="stats">
                <h3>Resultados del Concurso</h3>
                <div class="stat-item">
                    <span>Ganador Actual:</span>
                    <span id="concurso_lblGanador" class="val">---</span>
                </div>
                <div class="stat-item">
                    <span>Mejor Puntaje:</span>
                    <span id="concurso_lblMejorPuntaje" class="val">0</span>
                </div>
                <div style="background-color: #f0f7ff; padding: 10px; border-radius: 8px; margin-top: 10px; border-left: 4px solid #3498db;">
            <p style="margin: 5px 0;">Edad del Ganador: <span id="concurso_lblEdad">0</span> años</p>
            <p style="margin: 5px 0;">Puntos por Edad: <span id="concurso_lblPuntosEdad">0</span> pts</p>
        </div>
            </div>
        </section>

        <section id="aspirante" class="hidden">
            <h3>Datos del Aspirante</h3>
            
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="aspirante_inNombre">
            </div>
            <div class="form-group">
                <label>Apellido</label>
                <input type="text" id="aspirante_inApellido">
            </div>
            <div class="form-group">
                <label>Cédula</label>
                <input type="number" id="aspirante_inCedula">
            </div>
            <div class="form-group">
                <label>Sexo</label>
                <select id="aspirante_inSexo">
                    <option value="F">Femenino</option>
                    <option value="M">Masculino</option>
                </select>
            </div>
            <div class="form-group">
                <label>Fecha de Nacimiento</label>
                <input type="date" id="aspirante_inFechaNac">
            </div>
            <div class="form-group">
                <label>Índice Académico (Máx 25)</label>
                <input type="number" id="aspirante_inPuntoIndAcademico" max="25">
            </div>
            <div class="form-group">
                <label>Puntos Preparador (Máx 15)</label>
                <input type="number" id="aspirante_inPuntoPreparador" max="15">
            </div>
            <div class="form-group">
                <label>Puntos Diplomas (Máx 10)</label>
                <input type="number" id="aspirante_inPuntoDiplomas" max="10">
            </div>

            <div class="form-group">
                <label>Estado Civil</label>
                    <select id="aspirante_inEstadoCivil">
                    <option value="casado">Casado</option>
                    <option value="soltero">Soltero</option>
                    <option value="viudo">Viudo</option>
                </select>

            <button id="aspirante_btAceptar">Guardar Aspirante</button>
            <button id="aspirante_btCancelar" class="btn-secondary">Cancelar</button>
        </section>
    </div>

    <script type="module">
        import Cl_vConcurso from "./dist/views/Cl_vConcurso.js";
        import Cl_vAspirante from "./dist/views/Cl_vAspirante.js";
        import Cl_cConcurso from "./dist/controllers/Cl_cConcurso.js";
        import Cl_cAspirante from "./dist/controllers/Cl_cAspirante.js";

        // 1. Instanciamos las Vistas
        const vConcurso = new Cl_vConcurso();
        const vAspirante = new Cl_vAspirante();

        // 2. Instanciamos los Controladores
        const cAspirante = new Cl_cAspirante(vAspirante);
        const cConcurso = new Cl_cConcurso(vConcurso, cAspirante);
    </script>
</body>
</html>
